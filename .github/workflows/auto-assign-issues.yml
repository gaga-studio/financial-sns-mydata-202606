name: Auto Assign Issues

on:
  issues:
    types:
      - opened
      - reopened

permissions:
  issues: write

jobs:
  assign:
    name: assign
    runs-on: ubuntu-latest

    steps:
      - name: Assign maintainers
        uses: actions/github-script@v7
        with:
          script: |
            const candidates = ["sjh9714", "Two-Silver", "jsk4581"];
            const assigned = [];

            for (const assignee of candidates) {
              try {
                await github.rest.issues.addAssignees({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: context.issue.number,
                  assignees: [assignee],
                });
                assigned.push(assignee);
              } catch (error) {
                core.warning(`Could not assign ${assignee}: ${error.message}`);
              }
            }

            if (assigned.length === 0) {
              core.setFailed("No maintainers could be assigned to the issue.");
            }
